<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Charles Architecture</title>
  <style>
    @font-face {
      font-family: 'AIGDT';
      src: url('fonts/AIGDT-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-color: #FFFFFF;
      color: #001F3F;               /* deep dark blue */
      font-family: 'AIGDT', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.45rem;           /* large – adjust if needed */
      line-height: 1.58;            /* slightly tighter */
      font-weight: 400;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 0;
      margin: 0;
    }

    .text-container {
      width: 100%;
      height: 100%;
      padding: 0;                   /* zero padding – text touches every edge */
      overflow-y: auto;             /* scroll only if needed on small screens */
      text-align: left;
    }

    p {
      margin-bottom: 1.55em;
    }

    @media (max-width: 768px) {
      body {
        font-size: 1.25rem;
        line-height: 1.52;
      }
    }

    @media (max-width: 480px) {
      body {
        font-size: 1.1rem;
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>

  <div class="text-container">
    <p>About</p>
    <p>.</p>
    <p>.</p>
    <p>.</p>
    <p>.</p>
    <p>.</p>
    <p>.</p>
  </div>

</body>

</html>
